<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="image/store.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />

    <!-- Primary Meta Tags -->
    <title>متجرنا</title>
    <meta name="title" content="متجرنا | أفضل المنتجات بأفضل الأسعار" />
    <meta
      name="description"
      content="اكتشف تشكيلة واسعة من الإلكترونيات والأزياء والاكسسوارات في متجرنا. تسوق آمن، توصيل سريع، وجودة مضمونة."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:title" content="متجرنا | تسوق بذكاء وأناقة" />
    <meta
      property="og:description"
      content="وجهتك الأولى للتسوق الإلكتروني في فلسطين. جودة عالمية، أسعار منافسة."
    />
    <meta property="og:image" content="image/store.png" />

    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Google Fonts: Tajawal only (limit weights to reduce mobile payload) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>

    <div id="root"></div>
  </body>

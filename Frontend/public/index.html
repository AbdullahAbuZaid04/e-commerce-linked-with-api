<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="image/store.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />

    <!-- Primary Meta Tags -->
    <title>متجرنا</title>
    <meta name="title" content="متجرنا | أفضل المنتجات بأفضل الأسعار" />
    <meta
      name="description"
      content="اكتشف تشكيلة واسعة من الإلكترونيات والأزياء والاكسسوارات في متجرنا. تسوق آمن، توصيل سريع، وجودة مضمونة."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:title" content="متجرنا | تسوق بذكاء وأناقة" />
    <meta
      property="og:description"
      content="وجهتك الأولى للتسوق الإلكتروني في فلسطين. جودة عالمية، أسعار منافسة."
    />
    <meta property="og:image" content="image/store.png" />

    <!-- Preconnect for critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://e-commerce-fullstack-v8ok.onrender.com" />

    <!-- Google Fonts: Tajawal (non-render-blocking) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Inline critical CSS for above-the-fold content -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Tajawal',sans-serif;line-height:1.6;color:#1e293b;background-color:#f8fafc;direction:rtl;overflow-x:hidden}#root{min-height:100vh}img{max-width:100%;height:auto;display:block}
    </style>

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>

services:
  - type: web
    name: e-commerce-api
    env: node
    rootDir: Backend
    buildCommand: npm install && npm run prisma:generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.com
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: ecommerce-db
    databaseName: ecommerce
    plan: free
